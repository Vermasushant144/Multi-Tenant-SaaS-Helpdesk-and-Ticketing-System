spring.application.name=helpdesk-backend

# ─── Database ──────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3301/helpdesk_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:PpC6H6@@}

# ─── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.devtools.restart.enabled=false

# ─── Server ────────────────────────────────────────────────
server.port=${PORT:8081}

# ─── JWT ───────────────────────────────────────────────────
jwt.secret=HelpdeskSuperSecretKey2026MustBe256BitsLongForHS256Algorithm
jwt.expiration=86400000